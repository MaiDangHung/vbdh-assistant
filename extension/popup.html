<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VBDH Assistant</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📋 Trợ lý văn bản điều hành</h1>
    </div>

    <!-- Main view -->
    <div id="main-view" class="section">
      <p class="info-text">Click vào nút bên dưới để mở bảng điều khiển trên trang QLVBDH.</p>
      <button id="btn-open" class="btn btn-primary">🔍 Mở bảng điều khiển</button>
    </div>

    <!-- Settings -->
    <div id="settings" class="section hidden">
      <div class="card">
        <div class="card-title">⚙️ Cài đặt</div>
        <div class="settings-form">
          <label>API Server URL</label>
          <input type="url" id="setting-api-url" placeholder="https://tbklhoatien.danangsite.com.vn/api/v1/ext">
          <label>API Key</label>
          <input type="password" id="setting-api-key" placeholder="Nhập API Key...">
          <div class="settings-actions">
            <button id="btn-save-settings" class="btn btn-primary">💾 Lưu</button>
          </div>
        </div>
      </div>
    </div>

    <div class="footer-actions">
      <button id="btn-settings" class="btn-icon" title="Cài đặt">⚙️</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
