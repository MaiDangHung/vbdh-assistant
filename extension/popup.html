<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VBDH Assistant</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📋 Trợ lý văn bản điều hành</h1>
    </div>

    <!-- Login View -->
    <div id="login-view" class="section hidden">
      <div class="card">
        <div class="card-title">🔐 Đăng nhập</div>
        <div class="login-form">
          <label for="login-username">Tên đăng nhập <span class="required">*</span></label>
          <input type="text" id="login-username" placeholder="Nhập tên đăng nhập..." autocomplete="username">
          <label for="login-password">Mật khẩu <span class="required">*</span></label>
          <input type="password" id="login-password" placeholder="Nhập mật khẩu..." autocomplete="current-password">
          <div id="login-error" class="error-text hidden"></div>
          <button id="btn-login" class="btn btn-primary btn-full">🔑 Đăng nhập</button>
        </div>
      </div>
    </div>

    <!-- Main View (logged in) -->
    <div id="main-view" class="section hidden">
      <!-- User info card -->
      <div class="card user-card">
        <div class="user-info">
          <div class="user-avatar" id="user-avatar">👤</div>
          <div class="user-details">
            <div class="user-name" id="user-name">—</div>
            <div class="user-role" id="user-role">—</div>
          </div>
        </div>
        <button id="btn-logout" class="btn btn-secondary btn-sm">Đăng xuất</button>
      </div>

      <!-- Quick Actions -->
      <div class="quick-actions">
        <button id="btn-open-panel" class="btn btn-primary">🔍 Mở bảng điều khiển</button>
      </div>

      <!-- Settings when logged in -->
      <div class="card settings-card">
        <div class="card-title">⚙️ Cài đặt</div>
        <div class="setting-row">
          <label class="toggle-label" for="toggle-floating">
            <span class="toggle-text">🔘 Hiển thị nút nổi trên trang</span>
            <label class="switch">
              <input type="checkbox" id="toggle-floating" checked>
              <span class="slider"></span>
            </label>
          </label>
        </div>
        <div class="setting-row">
          <label for="setting-api-url">API Server</label>
          <input type="text" id="setting-api-url" placeholder="https://...">
        </div>
        <div class="setting-row">
          <label for="setting-api-key">API Key (cho trích xuất)</label>
          <input type="text" id="setting-api-key" placeholder="vbdh-ext-sk-...">
        </div>
        <div class="setting-row">
          <button id="btn-save-url" class="btn btn-secondary btn-sm">💾 Lưu cài đặt</button>
        </div>
      </div>
    </div>

    <div class="footer-actions">
      <span id="status-text" class="status-text"></span>
      <span class="version-text">v2.0.0</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
