version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vbdh_assistant
      POSTGRES_USER: vbdh
      POSTGRES_PASSWORD: vbdh_secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vbdh -d vbdh_assistant"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Backend API (Spring Boot)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/vbdh_assistant
      SPRING_DATASOURCE_USERNAME: vbdh
      SPRING_DATASOURCE_PASSWORD: vbdh_secret
      AI_SERVICE_URL: http://ai-service:8000
    ports:
      - "8090:8080"
    depends_on:
      db:
        condition: service_healthy
      ai-service:
        condition: service_started
    restart: unless-stopped

  # AI Service (Python FastAPI) - dùng chung GLM API với tbkl-hoatien
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    environment:
      GLM_API_KEY: ${GLM_API_KEY:?GLM_API_KEY not set}
      GLM_BASE_URL: ${GLM_BASE_URL:-https://api.z.ai/api/anthropic}
      AI_MODEL: ${AI_MODEL:-glm-4.5-air}
    ports:
      - "8001:8000"
    restart: unless-stopped

volumes:
  pgdata:
