version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vbdh_assistant
      POSTGRES_USER: vbdh
      POSTGRES_PASSWORD: vbdh_secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vbdh -d vbdh_assistant"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Backend API (Spring Boot)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/vbdh_assistant
      SPRING_DATASOURCE_USERNAME: vbdh
      SPRING_DATASOURCE_PASSWORD: vbdh_secret
      AI_SERVICE_URL: http://ai-service:8000
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      ai-service:
        condition: service_started

  # AI Service (Python FastAPI)
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    environment:
      AI_API_URL: ${AI_API_URL:-http://localhost:11434/v1}
      AI_API_KEY: ${AI_API_KEY:-ollama}
      AI_MODEL: ${AI_MODEL:-glm-4}
    ports:
      - "8000:8000"

volumes:
  pgdata:
